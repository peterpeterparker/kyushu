name: Worker Release

on:
  push:
    tags:
      - "worker/v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build artifacts
        uses: ./.github/actions/build-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: out/kyushu_worker.wasm
          name: ${{ github.ref_name }}

      - name: Update worker wasm
        run: |
          mkdir -p cli/src/resources
          cp out/kyushu_worker.wasm cli/src/resources/kyushu_worker.wasm

      - name: Create Pull Request
        uses: ./.github/actions/create-pr
        with:
          title: "chore: update worker wasm ${{ github.ref_name }}"
          body: "Updates the embedded worker wasm to ${{ github.ref_name }}"
          branch: "chore/worker-wasm-${{ github.ref_name }}"
